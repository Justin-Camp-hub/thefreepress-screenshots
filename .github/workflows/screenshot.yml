name: Daily Free Press Screenshot

on:
  schedule:
    # 9am Pacific = 4pm UTC (during PDT)
    # Adjust to 5pm UTC (0 17) during standard time (Nov-Mar)
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Take screenshot
        run: npm run screenshot

      - name: Upload screenshot as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot
          path: /tmp/thefreepress-*.png
          retention-days: 90

      - name: Create release and upload
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: /tmp/thefreepress-*.png
          tag_name: screenshot-${{ github.run_number }}
          name: Free Press Screenshot - ${{ github.run_id }}
          body_path: /tmp/screenshot-meta.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

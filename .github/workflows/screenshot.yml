name: Daily Free Press Screenshot

on:
  schedule:
    # 9am Pacific = 4pm UTC (March-November, PDT)
    # Change to '0 17 * * *' for November-March (PST)
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Take screenshot of The Free Press
        uses: karol-brejna-i/webpage-screenshot-action@v1
        with:
          url: https://www.thefp.com
          output: thefreepress-${{ github.run_id }}.png
          mode: page

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: ${{ github.workspace }}/*.png
          tag_name: screenshot-${{ github.run_number }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: ${{ github.workspace }}/*.png
          retention-days: 90

name: Daily Free Press Screenshot

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/puppeteer/puppeteer:22.6.0
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create and run screenshot script
        run: |
          cat > /tmp/screenshot.js << 'EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          
          (async () => {
            const browser = await puppeteer.launch({
              headless: true
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1440, height: 900 });
            await page.goto('https://www.thefp.com', { waitUntil: 'networkidle2', timeout: 30000 });
            await page.waitForTimeout(1000);
            const date = new Date().toISOString().split('T')[0];
            await page.screenshot({ path: `/tmp/thefreepress-${date}.png`, fullPage: false });
            await browser.close();
          })();
          EOF
          
          node /tmp/screenshot.js
          cp /tmp/thefreepress-*.png .

      - name: Upload as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: '*.png'
          retention-days: 90

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: '*.png'
          tag_name: screenshot-${{ github.run_number }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

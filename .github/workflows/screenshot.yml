name: Daily Free Press Screenshot

on:
  schedule:
    # 9am Pacific = 4pm UTC (March-November, PDT)
    # Change to '0 17 * * *' (5pm UTC) for November-March (PST)
    - cron: '0 16 * * *'
  
  # Manual trigger for testing
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Take screenshot
        run: npm run screenshot

      - name: Upload to releases
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: screenshots/*.png
          tag_name: screenshot-${{ github.run_number }}
          name: Screenshot ${{ github.run_id }}
          body: "Automated screenshot from ${{ github.run_id }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/*.png
          retention-days: 90

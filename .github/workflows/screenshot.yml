name: Daily Free Press Screenshot

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libxss1 libasound2 libappindicator1 libindicator7 fonts-liberation xdg-utils

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Create screenshot script
        run: |
          cat > screenshot.js << 'EOF'
          const puppeteer = require('puppeteer');
          
          (async () => {
            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1440, height: 900 });
            await page.goto('https://www.thefp.com', { waitUntil: 'networkidle2' });
            const date = new Date().toISOString().split('T')[0];
            await page.screenshot({ path: `thefreepress-${date}.png`, fullPage: false });
            await browser.close();
            console.log('✓ Screenshot saved');
          })();
          EOF

      - name: Take screenshot
        run: node

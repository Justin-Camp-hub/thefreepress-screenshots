name: Daily Free Press Screenshot

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: npm install -D @playwright/test && npx playwright install chromium

      - name: Take screenshot
        run: |
          cat > screenshot.mjs << 'EOF'
          import { chromium } from 'playwright';
          
          const browser = await chromium.launch();
          const page = await browser.newPage({ viewport: { width: 1440, height: 900 } });
          await page.goto('https://www.thefp.com', { waitUntil: 'networkidle' });
          const date = new Date().toISOString().split('T')[0];
          await page.screenshot({ path: `thefreepress-${date}.png`, fullPage: false });
          await browser.close();
          EOF
          
          node screenshot.mjs

      - name: Upload as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: '*.png'
          retention-days: 90

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: '*.png'
          tag_name: screenshot-${{ github.run_number }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
